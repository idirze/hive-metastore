name: docker-rebuild 

on:
  ### Periodically rebuild all the images to fix os security vulnerabilities
  schedule:
    # At 05:00 AM, only on Tuesday
    #- cron: "0 5 * * 2"
    # https://crontab.cronhub.io/
    # At 05:"0 AM, only on Tuesday
    - cron: "0 5 * * 2"
  # The release should be created manually (or with user token=pr approval/merge) in order to trigger the event
  ### https://github.com/orgs/community/discussions/25281
  ### Instead of using the event, we call the workflow from release-please workflow (more secure)
  #release:
  #  types: [published]

  workflow_dispatch:

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  # Only cancel in-progress jobs or runs for the current workflow - matches against branch & tags
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:

  latest-github-release:
    if: github.repository_owner == 'OKDP'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag_name: ${{ steps.git-release-tag.outputs.tag }}
    steps:
      - name: Checkout Repo ⚡️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Get latest GitHub Release tag name 📥
        id: git-release-tag
        uses: oprypin/find-latest-tag@eaa889b9a4a9be89c2f71b46894b5607ba01eae4 # v1.1.3
        with:
          repository: ${{ github.repository }}
          releases-only: true
          prefix: "v"

      - name: Info - Found latest release tag
        run: |
          echo "tag_name: ${{ steps.git-release-tag.outputs.tag }}"
        shell: bash

  metastore-versions:
    needs: [latest-github-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      metastore_versions: ${{ steps.parse.outputs.metastore_versions }}
      git_latest_release_tag: ${{ needs.latest-github-release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.latest-github-release.outputs.tag_name }}
      - name: Get metastore versions
        id: parse
        uses: ./.github/actions/metastore-versions

      - name: Info - Found latest release tag
        run: |
          echo "tag_name: ${{ needs.latest-github-release.outputs.tag_name }}"
        shell: bash

  docker-publish:
    needs: [metastore-versions]
    if: github.repository_owner == 'OKDP' && needs.metastore-versions.outputs.git_latest_release_tag != ''
    strategy:
      fail-fast: false
      matrix:
        metastore-version: ${{ fromJson(needs.metastore-versions.outputs.metastore_versions) }}
    uses: ./.github/workflows/docker-build-test-push-template.yml
    with:
      context: .
      dockerfile: docker/Dockerfile
      metastore_version: ${{ matrix.metastore-version }}
      publish_to_registry: "true"
      registry: ${{ vars.REGISTRY || 'quay.io' }}
      git_latest_release_tag: ${{ needs.metastore-versions.outputs.git_latest_release_tag }}
    secrets: inherit
