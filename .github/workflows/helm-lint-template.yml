name: ci

on:
  workflow_call:
    inputs:
      skip_chart_test:
        description: Wether to deploy and test the chart
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash

jobs:

  helm-lint:
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    steps:
      - name: Checkout Repo ⚡️
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.15.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.10'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0

      - name: Run chart-testing (list-changed) ✅
        id: list-changed
        run: |
          changed=$(ct list-changed --config .ct.yml)
          if [[ -n "$changed" ]]; then
            echo "list_changed=$(echo ${changed} | tr -d \')" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chart-testing (lint) ✅
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config .ct.yml --check-version-increment=false --print-config

      - name: Free up disk space 🧹
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test == 'false'
        uses: okdp/gh-workflows/.github/actions/free-disk-space@v1

      - name: Set up kind cluster ✅
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test == 'false'
        uses: okdp/gh-workflows/.github/actions/setup-kind@v1

      - name: Run chart-testing (install) ✅
        if: steps.list-changed.outputs.changed == 'true' && inputs.skip_chart_test == 'false'
        run: ct install --config .ct.yml --print-config

      - name: Install helm-docs
        uses: okdp/gh-workflows/.github/actions/helm-docs@v1

      - name: Generate helm docs
        run: |
          echo "Generate docs from charts"
          helm-docs -c .

      - name: Commit helm docs changes
        # Github token from forked repo does not have permission to push to target repo
        # Skip the step for PRs from forked repos
        if: |
          ${{ ((github.event_name == 'push') || (github.event_name == 'pull_request'
                && github.event.pull_request.head.repo.full_name == github.repository)) }}
        uses: EndBug/add-and-commit@777a761e0f8293b7b051170404976d7cf10611cb # v9.1.4
        with:
          pull: "--rebase --autostash"
          add: "**/README.md"
          message: '[helm-docs] Update readme'
          author_name: github-actions[bot]
          author_email: 41898282+github-actions[bot]@users.noreply.github.com
